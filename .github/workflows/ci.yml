name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest

      - name: Headless UI smoke test
        run: |
          xvfb-run -a python - <<'PY'
          import tkinter as tk
          from madlib_generator.settings import load_settings
          from madlib_generator.ui import MadlibApp

          root = tk.Tk()
          MadlibApp(root, load_settings())
          root.update_idletasks()
          root.update()
          root.destroy()
          PY
